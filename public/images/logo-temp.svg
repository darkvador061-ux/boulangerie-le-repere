<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 260" width="300" height="260">
  <!-- Oval principal -->
  <ellipse cx="150" cy="132" rx="130" ry="110" fill="#3C4050"/>

  <!-- Double bordure dorée -->
  <ellipse cx="150" cy="132" rx="122" ry="102" fill="none" stroke="#D4831A" stroke-width="1.8" opacity="0.7"/>
  <ellipse cx="150" cy="132" rx="126" ry="106" fill="none" stroke="#D4831A" stroke-width="0.6" opacity="0.3"/>

  <!-- Épi de blé stylisé (haut) -->
  <line x1="150" y1="52" x2="150" y2="78" stroke="#D4831A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Grains centraux -->
  <ellipse cx="150" cy="47" rx="5.5" ry="8" fill="#F0A832"/>
  <!-- Grains gauche -->
  <ellipse cx="143" cy="53" rx="4.5" ry="6.5" fill="#F0A832" transform="rotate(-22 143 53)"/>
  <ellipse cx="139" cy="62" rx="4" ry="6" fill="#D4831A" transform="rotate(-30 139 62)"/>
  <!-- Grains droite -->
  <ellipse cx="157" cy="53" rx="4.5" ry="6.5" fill="#F0A832" transform="rotate(22 157 53)"/>
  <ellipse cx="161" cy="62" rx="4" ry="6" fill="#D4831A" transform="rotate(30 161 62)"/>

  <!-- Séparateur haut -->
  <line x1="55" y1="88" x2="115" y2="88" stroke="#D4831A" stroke-width="0.8" opacity="0.6"/>
  <line x1="185" y1="88" x2="245" y2="88" stroke="#D4831A" stroke-width="0.8" opacity="0.6"/>
  <text x="150" y="91" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#D4831A" opacity="0.9">✦</text>

  <!-- "LA BOULANGERIE" -->
  <text x="150" y="108" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="10.5" fill="#939AA8"
        letter-spacing="3.5" font-weight="400">LA BOULANGERIE</text>

  <!-- "Le Repère" titre principal -->
  <text x="150" y="156" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="46" fill="#C4769A"
        font-style="italic" font-weight="400">Le Repère</text>

  <!-- Séparateur bas -->
  <line x1="65" y1="168" x2="235" y2="168" stroke="#D4831A" stroke-width="0.8" opacity="0.5"/>

  <!-- "ISLE-EN-DODON" -->
  <text x="150" y="186" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif"
        font-size="9" fill="#6A7080"
        letter-spacing="3">ISLE-EN-DODON · 31</text>

  <!-- Trois points décoratifs bas -->
  <circle cx="126" cy="200" r="2" fill="#D4831A" opacity="0.5"/>
  <circle cx="150" cy="202" r="2.8" fill="#D4831A" opacity="0.7"/>
  <circle cx="174" cy="200" r="2" fill="#D4831A" opacity="0.5"/>
</svg>
